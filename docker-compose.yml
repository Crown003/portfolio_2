version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: crown-postgres
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-portfolio}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
